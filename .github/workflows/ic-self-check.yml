# ic-self-check — runs every standalone test suite on pushes to main and on PRs.
#
# PR5-06 (adversarial review of PR #5): the repo's 600+ checks were
# honor-system; Milestone B (the enforcement-substrate flip) must not land
# on a repo with zero CI. This is the Bootstrap-side minimal workflow; the
# seam-mandated `protocol-compatibility` job (seam contract §8.2) is a
# separate, cross-repo concern that layers on top at pin-bump time.
#
# The suites are standalone scripts that call sys.exit() — run each file
# directly with python3, never via pytest (see tests/ and README §Tests).
name: ic-self-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  suites:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Compose, do not fork: the per-suite loop this step used to inline now
      # lives in bin/run-tests, so CI and a local run cannot drift. The runner
      # additionally flags a suite that crashes before printing its summary
      # (whose checks would otherwise vanish from the totals rather than
      # register as a failure) and fails the run if a suite writes into the
      # working tree instead of its fixture.
      - name: Run all standalone suites
        run: bin/run-tests
